services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./secure_slm.db
      - SLM_MODE=template
      - SECRET_KEY=change-in-production
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=changeme
    volumes:
      - ./data:/app/data

